<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>系统设置</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link type="text/css" href="resources/css/reset.css" rel="stylesheet" />
    <link type="text/css" href="resources/css/default.css" rel="stylesheet" />
    <style>
        html, body { height: auto; overflow: auto !important; }
        body { background-color: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; display: flex; }
        .sidebar { width: 200px; margin-right: 20px; }
        .menu { background: #fff; border: 1px solid #d9d9d9; }
        .menu-item { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
        .menu-item:hover { background: #f5f5f5; }
        .menu-item.active { background: #e6f7ff; color: #1890ff; border-left: 3px solid #1890ff; }
        .content { flex: 1; background: #fff; border: 1px solid #d9d9d9; }
        .header { padding: 20px 20px 0; border-bottom: 1px solid #f0f0f0; margin-bottom: 20px; }
        .body { padding: 20px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 4px; font-weight: 500; color: #262626; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #d9d9d9; border-radius: 2px; box-sizing: border-box; }
        input[type="checkbox"] { width: auto; margin-right: 8px; }
        .checkbox-group { margin-bottom: 8px; }
        button { padding: 8px 16px; background: #1890ff; color: white; border: none; cursor: pointer; margin-right: 8px; }
        button:hover { background: #40a9ff; }
        .alert { padding: 12px 16px; background: #e6f7ff; border-left: 4px solid #1890ff; margin-bottom: 16px; border-radius: 2px; }
        .divider { border-top: 1px solid #f0f0f0; margin: 20px 0; }
        .sub-title { font-size: 14px; font-weight: bold; color: #262626; margin-bottom: 12px; }
        .help-text { font-size: 12px; color: #8c8c8c; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="menu">
                <div class="menu-item active">基本信息</div>
                <div class="menu-item">记账规则</div>
                <div class="menu-item">缓冲配置</div>
                <div class="menu-item">日切设置</div>
                <div class="menu-item">字典管理</div>
                <div class="menu-item">用户管理</div>
                <div class="menu-item">权限管理</div>
            </div>
        </div>

        <div class="content">
            <div class="header">
                <h2>系统设置</h2>
            </div>

            <div class="body">
                <div class="alert">
                    修改系统设置后，请确保其他模块的配置与此保持一致，以避免业务流程中断。
                </div>

                <div class="sub-title">基本信息</div>

                <div class="form-group">
                    <label>系统名称</label>
                    <input type="text" value="金融级账务核心系统" />
                    <div class="help-text">在报表和界面中显示的系统名称</div>
                </div>

                <div class="form-group">
                    <label>所属机构代码</label>
                    <input type="text" value="ORG001" />
                    <div class="help-text">用于标识该系统部署的机构</div>
                </div>

                <div class="form-group">
                    <label>系统版本</label>
                    <input type="text" value="v1.0.0" disabled />
                </div>

                <div class="divider"></div>

                <div class="sub-title">核心设置</div>

                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" checked /> 启用自动开户
                        <div class="help-text">记账时，如果账户不存在，系统将根据模板自动创建</div>
                    </div>
                </div>

                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" checked /> 启用缓冲记账
                        <div class="help-text">将交易先缓存，然后按规则定时入账</div>
                    </div>
                </div>

                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" checked /> 启用冻结/解冻
                        <div class="help-text">支持账户资金冻结和解冻功能</div>
                    </div>
                </div>

                <div class="form-group">
                    <label>会计日切时间</label>
                    <input type="time" value="23:59:00" />
                    <div class="help-text">每天的日终结账时间，将在此时间触发日切流程</div>
                </div>

                <div class="form-group">
                    <label>默认会计科目体系</label>
                    <select>
                        <option>中国会计准则 (CAS)</option>
                        <option>国际财务报告准则 (IFRS)</option>
                        <option>小企业会计准则</option>
                    </select>
                </div>

                <div class="divider"></div>

                <div class="sub-title">消息队列</div>

                <div class="form-group">
                    <label>MQ 类型</label>
                    <select>
                        <option>RocketMQ</option>
                        <option>Kafka</option>
                        <option>RabbitMQ</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>MQ 连接地址</label>
                    <input type="text" value="mq-broker.internal:9876" />
                </div>

                <div class="divider"></div>

                <div class="sub-title">缓存设置</div>

                <div class="form-group">
                    <label>缓存类型</label>
                    <select>
                        <option>Redis</option>
                        <option>Memcached</option>
                        <option>内存缓存</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Redis 地址</label>
                    <input type="text" value="redis.internal:6379" />
                </div>

                <div class="form-group">
                    <label>缓存过期时间 (分钟)</label>
                    <input type="number" value="1440" />
                </div>

                <div class="divider"></div>

                <button>保存设置</button>
                <button style="background: #f0f0f0; color: #000;">重置</button>
            </div>
        </div>
    </div>
</body>
</html>
